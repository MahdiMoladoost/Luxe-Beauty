name: CI

on:
  push:
    branches:
      - main
      - rebuild/full-platform
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: luxe
          POSTGRES_PASSWORD: luxe_dev_password
          POSTGRES_DB: luxe_beauty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U luxe -d luxe_beauty_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      APP_ENV: test
      APP_URL: http://localhost:5000
      NEXT_PUBLIC_APP_URL: http://localhost:5000
      DATABASE_URL: postgresql://luxe:luxe_dev_password@127.0.0.1:5432/luxe_beauty_test?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      IDENTITY_PROVIDER: mock
      PAYMENT_PROVIDER: mock
      SMS_PROVIDER: mock
      MAP_PROVIDER: mock
      STORAGE_PROVIDER: minio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and refresh lockfile
        run: npm install --no-audit --no-fund

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Generate baseline migration SQL
        run: |
          mkdir -p prisma/migrations/20260720000000_initial
          printf 'provider = "postgresql"\n' > prisma/migrations/migration_lock.toml
          npx prisma migrate diff \
            --from-empty \
            --to-schema-datamodel prisma/schema.prisma \
            --script > prisma/migrations/20260720000000_initial/migration.sql
          test -s prisma/migrations/20260720000000_initial/migration.sql

      - name: Apply migrations to clean PostgreSQL
        run: npm run db:migrate:deploy

      - name: Lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint.log

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Production build
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build application image
        run: docker build --target runtime --tag luxe-beauty-ci:${{ github.sha }} .

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Upload generated foundations and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-foundations
          path: |
            package-lock.json
            prisma/migrations/migration_lock.toml
            prisma/migrations/20260720000000_initial/migration.sql
            lint.log
          if-no-files-found: warn
          retention-days: 3
