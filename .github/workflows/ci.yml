name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - agent/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generated media integrity
        run: node scripts/validate-generated-media.mjs

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit > typecheck.log 2>&1

      - name: Production build
        id: build
        if: steps.typecheck.outcome == 'success'
        continue-on-error: true
        env:
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build > build.log 2>&1

      - name: Upload diagnostics
        if: always() && (steps.typecheck.outcome == 'failure' || steps.build.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            typecheck.log
            build.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Report validation failure
        if: steps.typecheck.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          if [ -f typecheck.log ]; then cat typecheck.log; fi
          if [ -f build.log ]; then cat build.log; fi
          exit 1
