name: One-time Luxe Beauty header repair

on:
  push:
    branches:
      - rebuild/full-platform
    paths:
      - .github/workflows/one-time-header-repair.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/full-platform
          fetch-depth: 0
      - name: Replace header and logo
        shell: python
        env:
          HEADER_GZIP_B64: 
          LOGO_WEBP_B64: 
        run: |
          import base64
          import gzip
          import os
          from pathlib import Path

          Path("components/layout/header.tsx").write_bytes(
              gzip.decompress(base64.b64decode(os.environ["HEADER_GZIP_B64"]))
          )
          Path("public/luxe-beauty-mark.webp").write_bytes(
              base64.b64decode(os.environ["LOGO_WEBP_B64"])
          )
          Path(".github/workflows/one-time-header-repair.yml").unlink()
      - name: Commit repaired header
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/layout/header.tsx public/luxe-beauty-mark.webp .github/workflows/one-time-header-repair.yml
          git commit -m "fix(ui): repair logo asset and reorganize header"
          git push origin HEAD:rebuild/full-platform
