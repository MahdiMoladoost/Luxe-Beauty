name: luxe-beauty

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luxe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luxe_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-luxe_beauty}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-luxe} -d ${POSTGRES_DB:-luxe_beauty}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-luxe_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-luxe_minio_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-luxe_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-luxe_minio_dev_password}
    entrypoint: >-
      /bin/sh -c '
      mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
      mc mb --ignore-existing local/luxe-public-media;
      mc mb --ignore-existing local/luxe-private-documents;
      mc mb --ignore-existing local/luxe-consultation;
      mc mb --ignore-existing local/luxe-review-media;
      mc mb --ignore-existing local/luxe-portfolio-media;
      mc mb --ignore-existing local/luxe-support-attachments;
      mc mb --ignore-existing local/luxe-temporary-uploads;
      '
    restart: "no"

  web:
    build:
      context: .
      target: runtime
    environment:
      NODE_ENV: development
      APP_ENV: development
      APP_URL: http://localhost:5000
      NEXT_PUBLIC_APP_URL: http://localhost:5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-luxe}:${POSTGRES_PASSWORD:-luxe_dev_password}@postgres:5432/${POSTGRES_DB:-luxe_beauty}?schema=public
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: luxe-beauty
      IDENTITY_PROVIDER: mock
      PAYMENT_PROVIDER: mock
      SMS_PROVIDER: mock
      MAP_PROVIDER: mock
      STORAGE_PROVIDER: minio
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-luxe_minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-luxe_minio_dev_password}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_MEDIA_BUCKET: luxe-public-media
      S3_PRIVATE_DOCUMENTS_BUCKET: luxe-private-documents
      S3_CONSULTATION_BUCKET: luxe-consultation
      S3_REVIEW_MEDIA_BUCKET: luxe-review-media
      S3_PORTFOLIO_MEDIA_BUCKET: luxe-portfolio-media
      S3_SUPPORT_ATTACHMENTS_BUCKET: luxe-support-attachments
      S3_TEMPORARY_UPLOADS_BUCKET: luxe-temporary-uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runtime
    command: ["npm", "run", "worker:start"]
    environment:
      NODE_ENV: development
      APP_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-luxe}:${POSTGRES_PASSWORD:-luxe_dev_password}@postgres:5432/${POSTGRES_DB:-luxe_beauty}?schema=public
      REDIS_URL: redis://redis:6379
      QUEUE_PREFIX: luxe-beauty
      WORKER_CONCURRENCY: 4
      IDENTITY_PROVIDER: mock
      PAYMENT_PROVIDER: mock
      SMS_PROVIDER: mock
      MAP_PROVIDER: mock
      STORAGE_PROVIDER: minio
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:
